meta:
  version: 3
  flow: Classic
  substituting_steps:
    +Magic.DRC: KLayout.Antenna
    +Checker.MagicDRC: Checker.KLayoutAntenna

# DO CHANGE
DESIGN_NAME: user_project_example
VERILOG_FILES: ["dir::src/user_project_example.v", "dir::src/tholin_riscv.v", "dir::src/uart.v", "dir::src/spi.v"]
CLOCK_PERIOD: 26
DIE_AREA: [0, 0, 2200, 2200]
DESIGN_REPAIR_TIE_FANOUT: true
DIODE_ON_PORTS: both
RUN_MAGIC_DRC: true
DRT_ANTENNA_REPAIR_ITERS: 15
GRT_ANTENNA_REPAIR_ITERS: 15
# Valid values are AREA 0-3 and DELAY 0-4
# DELAY 4 = fastest, but largest area
# AREA 3 = slowest, but smallest area
SYNTH_STRATEGY: DELAY 4


# DO NOT CHANGE
RUN_CTS: true
MAX_FANOUT_CONSTRAINT: 4
CLOCK_PORT: clk_i
VDD_NETS: ["VDD"]
GND_NETS: ["VSS"]
VERILOG_POWER_DEFINE: "USE_POWER_PINS"
RT_MAX_LAYER: Metal4
FP_PIN_ORDER_CFG: dir::pin_order.cfg
FP_PDN_MULTILAYER: false
FP_SIZING: absolute

KLAYOUT_DRC_THREADS: 1
KLAYOUT_DRC_OPTIONS:
  workers: max
  decks: "all,-antenna,-density"

KLAYOUT_ANTENNA_OPTIONS:
  workers: max
  decks: "antenna"

STD_CELL_LIBRARY: "gf180mcu_as_sc_mcu7t3v3"
KLAYOUT_RENDER_RESOLUTION: 8192
KLAYOUT_RENDER_OVERSAMPLING: 3
KLAYOUT_PROPERTIES: dir::gf180mcu_render.lyp
